name: Hardware Link Check

# Detects dead/expired AliExpress (and other) purchase links before users hit
# them. Runs weekly, on demand, and whenever the manifest or README changes.

on:
  schedule:
    # Every Monday at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:
  pull_request:
    paths:
      - "docs/hardware.yml"
      - "README.md"
      - "scripts/check_links.py"
      - ".github/workflows/link-check.yml"

permissions:
  contents: read
  issues: write

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Check hardware links
        id: check
        run: |
          set +e
          python scripts/check_links.py | tee link-report.txt
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Open / update issue on broken links
        # Only on scheduled or manual runs — PRs just fail the check.
        if: steps.check.outputs.exit_code != '0' && github.event_name != 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('link-report.txt', 'utf8');
            const title = '🔗 Broken hardware links detected';
            const body = [
              'The automated link checker found dead or expired purchase links.',
              '',
              'Fix them by editing `docs/hardware.yml` (and the README table).',
              '',
              '```',
              report.trim(),
              '```',
            ].join('\n');

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'broken-links',
            });

            if (issues.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['broken-links'],
              });
            }

      - name: Fail the job if links are broken
        if: steps.check.outputs.exit_code != '0'
        run: |
          echo "Broken links detected — see the report above."
          exit 1
